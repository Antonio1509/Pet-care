<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare | Sign Up</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <video autoplay muted loop playsinline class="login-video">
        <source src="Pets video.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="login-container">

        <div class="login-card">

            <div class="login-logo">
                <img src="https://i.ibb.co/GQ2qvSs8/Pets-logo.jpg" alt="PetCare Logo">
                <h1>Pet<span>Care</span></h1>
            </div>

            <h2>Create Account</h2>
            <p>Join PetCare today to get started</p>

            <form id="signupForm">

                <div class="input-group">
                    <input type="text" id="fullname" placeholder="Full Name" required>
                </div>

                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <input type="text" id="username" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div class="input-group">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                </div>

                <button type="submit" class="login-btn">
                    Sign Up
                </button>

                <p class="toggle-form-text">
                    Already have an account? <a href="./login.html">Login here</a>
                </p>

            </form>

        </div>

    </div>

    <script src="signup.js"></script>

</body>

</html>
